<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="مبيعاتي">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#6a1b9a">
<title>مبيعاتي</title>
<link rel="apple-touch-icon" href="apple-touch-icon.img">
<link rel="icon" href="apple-touch-icon.img">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:Tahoma,sans-serif;background:#f0eaf8;color:#1a1a2e;min-height:100vh;max-width:430px;margin:auto}
/* HEADER */
.hdr{background:#fff;border-bottom:1px solid #e0d0f0;padding:12px 16px;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(100,0,200,.08)}
.hdr-top{display:flex;justify-content:space-between;align-items:center}
.logo{font-size:16px;font-weight:900;color:#5e35b1}
.credit-txt{font-size:10px;font-weight:800;color:#7b1fa2;text-align:left}
.credit-sub{font-size:9px;color:#b39ddb;text-align:left}
/* DATE */
.dnav{display:flex;align-items:center;justify-content:center;gap:8px;background:#ede7f6;border-radius:20px;padding:7px 14px;margin:10px 14px 0}
.dnavbtn{background:none;border:none;color:#7e57c2;font-size:22px;cursor:pointer;line-height:1;padding:0 2px}
.dnavlbl{font-size:13px;font-weight:800;color:#4527a0;min-width:150px;text-align:center}
/* SUMMARY */
.sum{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:12px 14px}
.sc{background:#fff;border:1.5px solid #e0d0f0;border-radius:14px;padding:10px 6px;text-align:center}
.sc small{font-size:9px;color:#9e9e9e;display:block;margin-bottom:3px}
.sc b{font-size:15px;font-weight:800}
.sc.av b{color:#5e35b1}.sc.rv b{color:#e53935}.sc.tv b{color:#7b1fa2}
.sec{padding:0 14px 8px;font-size:11px;color:#9e9e9e;font-weight:700;text-align:left}
/* GRID */
.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:0 14px 80px}
/* SLOT */
.slot{background:#fff;border:2px dashed #ce93d8;border-radius:16px;padding:10px 6px;text-align:center;cursor:pointer;min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;user-select:none;-webkit-user-select:none}
.slot.has{border:2px solid #9c27b0}
.slot:active{opacity:.7;transform:scale(.96)}
.s-ico{width:46px;height:46px;border-radius:13px;background:linear-gradient(135deg,#6a1b9a,#ab47bc);display:flex;align-items:center;justify-content:center;margin:0 auto 6px;box-shadow:0 3px 8px rgba(100,0,200,.3)}
.s-ico svg{width:24px;height:24px}
.slot.has .s-ico{background:linear-gradient(135deg,#4a148c,#9c27b0)}
.s-name{font-size:9px;font-weight:800;color:#4527a0;margin-bottom:3px;line-height:1.3}
.s-pct{font-size:14px;font-weight:900;color:#5e35b1}
.s-empty{font-size:8px;color:#ce93d8}
.s-bar{width:100%;height:4px;background:#ede7f6;border-radius:99px;overflow:hidden;margin:4px 0 2px}
.s-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#7b1fa2,#ce93d8)}
.s-num{font-size:8px;font-weight:700;color:#9c27b0}
/* CHART SLOT */
.slot.chart-slot{border:2px solid #f9a825;background:linear-gradient(135deg,#fffde7,#fff8e1);grid-column:span 2;flex-direction:row;gap:12px;justify-content:center;min-height:80px}
.slot.chart-slot .s-ico{background:linear-gradient(135deg,#f57f17,#fbc02d);margin:0;flex-shrink:0}
.chart-txt{text-align:right}
.chart-txt b{font-size:14px;font-weight:900;color:#e65100;display:block}
.chart-txt span{font-size:10px;color:#f9a825}
/* OVERLAY */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:flex-end;justify-content:center}
.ov.open{display:flex}
/* MODAL */
.modal{background:#fff;border-radius:22px 22px 0 0;border-top:3px solid #9c27b0;padding:20px 18px 44px;width:100%;max-width:430px;animation:mup .25s ease;max-height:90vh;overflow-y:auto}
@keyframes mup{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.mhandle{width:36px;height:3px;background:#e0d0f0;border-radius:2px;margin:0 auto 14px}
.m-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.m-ico-big{width:52px;height:52px;border-radius:15px;background:linear-gradient(135deg,#4a148c,#9c27b0);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 12px rgba(100,0,200,.3)}
.m-ico-big svg{width:28px;height:28px}
.m-title{font-size:18px;font-weight:900;color:#4527a0}
.m-unit{font-size:11px;color:#9e9e9e;margin-top:2px}
/* STATS */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
.stat{background:#f5f0ff;border-radius:12px;padding:10px;text-align:center}
.stat small{font-size:9px;color:#9e9e9e;display:block;margin-bottom:2px}
.stat b{font-size:16px;font-weight:800;color:#5e35b1}
.stat.red b{color:#e53935}
.pbar{height:8px;background:#ede7f6;border-radius:99px;overflow:hidden;margin:10px 0 3px}
.pfill{height:100%;border-radius:99px;background:linear-gradient(90deg,#7b1fa2,#ce93d8);transition:width .4s}
.plbl{display:flex;justify-content:space-between;font-size:10px;color:#9e9e9e;margin-bottom:12px}
.plbl b{color:#5e35b1;font-size:13px}
/* FORM */
.fg{margin-bottom:12px}
.fg label{font-size:11px;color:#9e9e9e;display:block;margin-bottom:5px;font-weight:700}
.fi{width:100%;background:#f5f0ff;border:1.5px solid #e0d0f0;border-radius:10px;padding:12px;font-family:Tahoma,sans-serif;font-size:15px;color:#1a1a2e;outline:none;direction:rtl}
.fi:focus{border-color:#9c27b0}
/* DAILY LOG */
.dlog{margin-top:14px;border-top:1px solid #f0e6ff;padding-top:12px}
.dlog-t{font-size:11px;font-weight:800;color:#7b1fa2;margin-bottom:8px}
.dlog-row2{display:flex;gap:7px;margin-bottom:8px}
.dlog-inp{flex:1;background:#f5f0ff;border:1.5px solid #e0d0f0;border-radius:9px;padding:9px 11px;font-family:Tahoma,sans-serif;font-size:14px;color:#1a1a2e;outline:none;direction:rtl}
.dlog-inp:focus{border-color:#9c27b0}
.dlog-add{background:linear-gradient(135deg,#4a148c,#9c27b0);border:none;border-radius:9px;padding:9px 14px;font-family:Tahoma,sans-serif;font-size:13px;font-weight:800;color:#fff;cursor:pointer;white-space:nowrap}
.dlog-add:active{opacity:.7}
.dlog-list{display:flex;flex-direction:column;gap:5px;max-height:130px;overflow-y:auto}
.dlog-item{display:flex;justify-content:space-between;align-items:center;background:#f5f0ff;border-radius:8px;padding:7px 10px}
.dlog-time{font-size:10px;color:#9e9e9e}
.dlog-val{font-size:12px;font-weight:800;color:#5e35b1}
.dlog-del{background:none;border:none;color:#e53935;font-size:14px;cursor:pointer;padding:0 3px}
.dlog-empty{font-size:11px;color:#ce93d8;text-align:center;padding:10px}
/* BUTTONS */
.mbtns{display:flex;gap:8px;margin-top:16px}
.mbtn-cancel{flex:1;background:#f5f0ff;border:1.5px solid #e0d0f0;border-radius:12px;padding:12px;font-family:Tahoma,sans-serif;font-size:13px;color:#9e9e9e;cursor:pointer;font-weight:700}
.mbtn-save{flex:2;background:linear-gradient(135deg,#4a148c,#9c27b0);border:none;border-radius:12px;padding:12px;font-family:Tahoma,sans-serif;font-size:13px;font-weight:900;color:#fff;cursor:pointer}
.mbtn-save:active,.mbtn-cancel:active{opacity:.7}
.mbtn-del{width:100%;background:#fff;border:1.5px solid #ffcdd2;border-radius:12px;padding:10px;font-family:Tahoma,sans-serif;font-size:12px;color:#e53935;cursor:pointer;margin-top:8px;font-weight:700}
/* CHART MODAL */
.chart-row{margin-bottom:10px}
.chart-lbl{display:flex;justify-content:space-between;font-size:10px;font-weight:700;color:#4527a0;margin-bottom:4px}
.chart-lbl span{color:#9e9e9e;font-weight:400}
.chart-track{height:22px;background:#f5f0ff;border-radius:99px;overflow:hidden}
.chart-fill{height:100%;border-radius:99px;display:flex;align-items:center;justify-content:flex-end;transition:width .5s}
.chart-fill em{font-size:9px;font-weight:800;color:#fff;font-style:normal;padding:0 7px;white-space:nowrap}
.chart-none{height:100%;background:#ede7f6;display:flex;align-items:center;justify-content:center;border-radius:99px}
.chart-none em{font-size:9px;color:#ce93d8;font-style:normal}
.chart-div{height:1px;background:#f0e6ff;margin:10px 0}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div class="logo">🔷 مبيعاتي</div>
    <div>
      <div class="credit-txt">تنفيذ محمد الخالد</div>
      <div class="credit-sub">يعمل بدون إنترنت</div>
    </div>
  </div>
  <div class="dnav">
    <button class="dnavbtn" id="btn-prev">&#8249;</button>
    <div class="dnavlbl" id="dlbl">—</div>
    <button class="dnavbtn" id="btn-next">&#8250;</button>
  </div>
</div>

<div class="sum">
  <div class="sc av"><small>✅ المحقق</small><b id="sum-a">0</b></div>
  <div class="sc rv"><small>⏳ المتبقي</small><b id="sum-r">0</b></div>
  <div class="sc tv"><small>🎯 الأهداف</small><b id="sum-t">0/13</b></div>
</div>
<div class="sec">اضغط على خانة لإدخال هدف</div>
<div class="grid" id="main-grid"></div>

<!-- SLOT MODAL -->
<div class="ov" id="slot-ov">
  <div class="modal" id="slot-modal">
    <div class="mhandle"></div>
    <div class="m-header">
      <div class="m-ico-big" id="m-ico"></div>
      <div>
        <div class="m-title" id="m-title">—</div>
        <div class="m-unit" id="m-unit">—</div>
      </div>
    </div>
    <div class="stats" id="m-stats" style="display:none">
      <div class="stat"><small>✅ المحقق</small><b id="m-sa">0</b></div>
      <div class="stat red"><small>⏳ المتبقي</small><b id="m-sr">0</b></div>
    </div>
    <div class="pbar" id="m-pbar" style="display:none"><div class="pfill" id="m-pfill" style="width:0%"></div></div>
    <div class="plbl" id="m-plbl" style="display:none"><span>نسبة الإنجاز</span><b id="m-ppct">0%</b></div>
    <div class="fg">
      <label>🎯 الهدف المستهدف</label>
      <input class="fi" id="m-goal" type="number" inputmode="numeric" placeholder="أدخل الهدف">
    </div>
    <div class="dlog">
      <div class="dlog-t">📅 إضافة مبيعات اليوم</div>
      <div class="dlog-row2">
        <input class="dlog-inp" id="m-log-inp" type="number" inputmode="numeric" placeholder="أدخل المبيعات">
        <button class="dlog-add" id="m-log-btn">＋ إضافة</button>
      </div>
      <div class="dlog-list" id="m-log-list"></div>
    </div>
    <div class="mbtns">
      <button class="mbtn-cancel" id="m-cancel">إلغاء</button>
      <button class="mbtn-save" id="m-save">💾 حفظ</button>
    </div>
    <button class="mbtn-del" id="m-del" style="display:none">🗑️ مسح الهدف</button>
  </div>
</div>

<!-- CHART MODAL -->
<div class="ov" id="chart-ov">
  <div class="modal">
    <div class="mhandle"></div>
    <div class="m-title" style="text-align:center;color:#e65100;margin-bottom:4px">📊 تقرير الأهداف</div>
    <div style="font-size:10px;color:#9e9e9e;text-align:center;margin-bottom:14px" id="chart-date"></div>
    <div id="chart-body"></div>
    <div class="mbtns" style="margin-top:14px">
      <button class="mbtn-save" id="chart-close" style="flex:1">إغلاق</button>
    </div>
  </div>
</div>

<script>
// ===== DATA =====
var FIXED = [
  {n:'iPhone',       u:'SAR', ico:'M9,2h14a3,3,0,0,1,3,3V27a3,3,0,0,1-3,3H9a3,3,0,0,1-3-3V5A3,3,0,0,1,9,2Zm0,0'},
  {n:'Non iPhone',   u:'SAR', ico:'M8,5h16a2,2,0,0,1,2,2V25a2,2,0,0,1-2,2H8a2,2,0,0,1-2-2V7A2,2,0,0,1,8,5Z'},
  {n:'Non Core',     u:'SAR', ico:'M4,5h24a2,2,0,0,1,2,2V21a2,2,0,0,1-2,2H4a2,2,0,0,1-2-2V7A2,2,0,0,1,4,5Z'},
  {n:'EBU MRC',      u:'SAR', ico:'M4,10h24a2,2,0,0,1,2,2V28a2,2,0,0,1-2,2H4a2,2,0,0,1-2-2V12A2,2,0,0,1,4,10Z'},
  {n:'PS Voice',     u:'QTY', ico:'M6,6Q6,4,8,4L12,4Q14,4,14,6L15,11Q15,13,13,13L12,13Q11,13,13,15L17,19Q19,21,19,20L19,17Q21,17,21,17L26,18Q28,18,28,20L28,24Q28,26,26,26Q10,26,6,10Z'},
  {n:'PS Data',      u:'QTY', ico:'M4,13Q16,3,28,13 M8,17Q16,10,24,17 M12,21Q16,17,20,21 M16,25a2,2,0,1,1,0,.01'},
  {n:'PP Voice',     u:'QTY', ico:'M7,16Q7,7,16,7Q25,7,25,16 M4,15h5a0,0,0,0,1,0,0v9a2.5,2.5,0,0,1-5,0Z M23,15h5a0,0,0,0,1,0,0v9a2.5,2.5,0,0,1-5,0Z'},
  {n:'PP Data',      u:'QTY', ico:'M4,13Q16,3,28,13 M7,17Q16,9,25,17 M11,21Q16,15,21,21'},
  {n:'Jawwy',        u:'QTY', ico:'M7,4h18a3,3,0,0,1,3,3V25a3,3,0,0,1-3,3H7a3,3,0,0,1-3-3V7A3,3,0,0,1,7,4Z'},
  {n:'FWA',          u:'QTY', ico:'M9,14h14a2,2,0,0,1,2,2v10a2,2,0,0,1-2,2H9a2,2,0,0,1-2-2V16A2,2,0,0,1,9,14Z M16,3v11 M6,9Q16,2,26,9 M9,12Q16,7,23,12'},
  {n:'FTTH',         u:'QTY', ico:'M16,4a12,12,0,1,1,0,24a12,12,0,0,1,0-24Z M16,4v24 M4,16h24 M6,9Q16,14,26,9 M6,23Q16,18,26,23'},
  {n:'Trade In',     u:'QTY', ico:'M5,4h10a2,2,0,0,1,2,2v17a2,2,0,0,1-2,2H5a2,2,0,0,1-2-2V6A2,2,0,0,1,5,4Z M19,11h8a2,2,0,0,1,2,2v11a2,2,0,0,1-2,2H19 M22,7l4-4l4,4 M23,3v8 M9,27l-4,4l-4-4 M5,28v-8'},
  {n:'Device Prot.', u:'QTY', ico:'M16,3L26,7v9Q26,23,16,29Q6,23,6,16V7Z M11,16l3,3l7-7'},
];

var MONTHS = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
var DAYS   = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];

var curD = new Date();
var activeSlot = -1;
var DATA = JSON.parse(localStorage.getItem('mv2') || '{}');

// ===== HELPERS =====
function dkey() {
  return curD.getFullYear()+'-'+(curD.getMonth()+1)+'-'+curD.getDate();
}

function fmt(n) {
  n = Number(n)||0;
  if(n>=1e6) return (n/1e6).toFixed(1).replace(/\.0$/,'')+'م';
  if(n>=1e3) return (n/1e3).toFixed(1).replace(/\.0$/,'')+'ك';
  return n.toLocaleString('ar');
}

function pct(a,g) { return g ? Math.min(Math.round(a/g*100),999) : 0; }

function getGoal(i) {
  var d = DATA[i]; return d ? Number(d.g||0) : 0;
}

function getLogs(i) {
  var d = DATA[i]; return d ? (d.logs||{}) : {};
}

function getAchieved(i) {
  var logs = getLogs(i);
  var k = dkey();
  var dayLogs = logs[k] || [];
  return dayLogs.reduce(function(s,l){ return s+l.v; }, 0);
}

function save() { localStorage.setItem('mv2', JSON.stringify(DATA)); }

// ===== SVG =====
function makeIco(path) {
  return '<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">' +
    '<path d="' + path + '" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>' +
    '</svg>';
}

// ===== DATE =====
function updateDate() {
  document.getElementById('dlbl').textContent =
    DAYS[curD.getDay()] + ' ' + curD.getDate() + ' ' + MONTHS[curD.getMonth()] + ' ' + curD.getFullYear();
  renderGrid();
}

document.getElementById('btn-prev').addEventListener('click', function() {
  curD = new Date(curD); curD.setDate(curD.getDate()-1); updateDate();
});
document.getElementById('btn-next').addEventListener('click', function() {
  curD = new Date(curD); curD.setDate(curD.getDate()+1); updateDate();
});

// ===== GRID =====
function renderGrid() {
  var tg=0, ta=0, filled=0;
  var G = document.getElementById('main-grid');
  G.innerHTML = '';

  for(var i=0; i<FIXED.length; i++) {
    (function(idx) {
      var f = FIXED[idx];
      var g = getGoal(idx);
      var a = getAchieved(idx);
      var p = pct(a,g);
      if(g>0){ tg+=g; ta+=a; filled++; }

      var div = document.createElement('div');
      div.className = 'slot' + (g>0 ? ' has' : '');

      var inner = '<div class="s-ico">' + makeIco(f.ico) + '</div>';
      inner += '<div class="s-name">' + f.n + '</div>';
      if(g>0) {
        inner += '<div class="s-pct">' + p + '%</div>';
        inner += '<div class="s-bar"><div class="s-fill" style="width:'+Math.min(p,100)+'%"></div></div>';
        inner += '<div class="s-num">' + fmt(a) + ' / ' + fmt(g) + '</div>';
      } else {
        inner += '<div class="s-empty">اضغط للإدخال</div>';
      }
      div.innerHTML = inner;

      div.addEventListener('click', function(e) {
        e.preventDefault(); e.stopPropagation();
        openSlot(idx);
      });

      G.appendChild(div);
    })(i);
  }

  // Chart button
  var ch = document.createElement('div');
  ch.className = 'slot chart-slot';
  ch.innerHTML =
    '<div class="s-ico" style="background:linear-gradient(135deg,#f57f17,#fbc02d);margin:0">' + makeIco('M3,20h5v9h-5Z M10,14h5v15h-5Z M17,8h5v21h-5Z M24,3h5v26h-5Z M5,19L12,13L19,7L26,2') + '</div>' +
    '<div class="chart-txt"><b>📊 التقرير</b><span>اضغط لعرض الكل</span></div>';
  ch.addEventListener('click', function(e) {
    e.preventDefault(); openChart();
  });
  G.appendChild(ch);

  document.getElementById('sum-a').textContent = fmt(ta);
  document.getElementById('sum-r').textContent = fmt(Math.max(0,tg-ta));
  document.getElementById('sum-t').textContent = filled+'/13';
}

// ===== SLOT MODAL =====
function openSlot(i) {
  activeSlot = i;
  var f = FIXED[i];
  var g = getGoal(i);
  var a = getAchieved(i);
  var r = Math.max(0,g-a);
  var p = pct(a,g);

  document.getElementById('m-ico').innerHTML = makeIco(f.ico);
  document.getElementById('m-title').textContent = f.n;
  document.getElementById('m-unit').textContent = 'الوحدة: ' + f.u + '  |  📅 ' + document.getElementById('dlbl').textContent;
  document.getElementById('m-goal').value = g || '';

  var has = g > 0;
  document.getElementById('m-stats').style.display = has ? 'grid' : 'none';
  document.getElementById('m-pbar').style.display  = has ? 'block' : 'none';
  document.getElementById('m-plbl').style.display  = has ? 'flex'  : 'none';
  document.getElementById('m-del').style.display   = has ? 'block' : 'none';

  if(has) {
    document.getElementById('m-sa').textContent = fmt(a) + ' ' + f.u;
    document.getElementById('m-sr').textContent = fmt(r) + ' ' + f.u;
    document.getElementById('m-pfill').style.width = Math.min(p,100)+'%';
    document.getElementById('m-ppct').textContent = p+'%';
  }

  renderDayLogs();
  document.getElementById('m-log-inp').value = '';
  document.getElementById('slot-ov').classList.add('open');
}

function closeSlot() {
  document.getElementById('slot-ov').classList.remove('open');
  activeSlot = -1;
}

function renderDayLogs() {
  var i = activeSlot;
  var f = FIXED[i];
  var logs = getLogs(i);
  var k = dkey();
  var dayLogs = logs[k] || [];
  var L = document.getElementById('m-log-list');
  if(!dayLogs.length) {
    L.innerHTML = '<div class="dlog-empty">لا توجد إدخالات اليوم</div>';
    return;
  }
  var html = '';
  for(var j=dayLogs.length-1; j>=0; j--) {
    var l = dayLogs[j];
    html += '<div class="dlog-item">' +
      '<span class="dlog-time">🕐 ' + l.t + '</span>' +
      '<span class="dlog-val">+' + fmt(l.v) + ' ' + f.u + '</span>' +
      '<button class="dlog-del" data-idx="'+j+'">✕</button>' +
      '</div>';
  }
  L.innerHTML = html;
  L.querySelectorAll('.dlog-del').forEach(function(btn) {
    btn.addEventListener('click', function() {
      delLog(Number(this.getAttribute('data-idx')));
    });
  });
}

function addLog() {
  var v = Number(document.getElementById('m-log-inp').value);
  if(!v || v<=0) return;
  var i = activeSlot;
  if(!DATA[i]) DATA[i] = {g:0, logs:{}};
  if(!DATA[i].logs) DATA[i].logs = {};
  var k = dkey();
  if(!DATA[i].logs[k]) DATA[i].logs[k] = [];
  var now = new Date();
  var t = now.getHours() + ':' + (now.getMinutes()<10?'0':'') + now.getMinutes();
  DATA[i].logs[k].push({v:v, t:t});
  save();
  document.getElementById('m-log-inp').value = '';
  // update stats
  var f = FIXED[i];
  var g = getGoal(i);
  var a = getAchieved(i);
  var r = Math.max(0,g-a);
  var p = pct(a,g);
  if(g>0) {
    document.getElementById('m-stats').style.display = 'grid';
    document.getElementById('m-pbar').style.display  = 'block';
    document.getElementById('m-plbl').style.display  = 'flex';
    document.getElementById('m-sa').textContent = fmt(a)+' '+f.u;
    document.getElementById('m-sr').textContent = fmt(r)+' '+f.u;
    document.getElementById('m-pfill').style.width = Math.min(p,100)+'%';
    document.getElementById('m-ppct').textContent = p+'%';
  }
  renderDayLogs();
  renderGrid();
}

function delLog(idx) {
  var i = activeSlot;
  var k = dkey();
  if(DATA[i] && DATA[i].logs && DATA[i].logs[k]) {
    DATA[i].logs[k].splice(idx,1);
    save();
    renderDayLogs();
    renderGrid();
  }
}

function saveSlot() {
  var g = Number(document.getElementById('m-goal').value)||0;
  if(!g) { alert('الرجاء إدخال الهدف'); return; }
  var i = activeSlot;
  if(!DATA[i]) DATA[i] = {logs:{}};
  DATA[i].g = g;
  save();
  closeSlot();
  renderGrid();
}

function clearSlot() {
  if(!confirm('مسح بيانات هذا الهدف؟')) return;
  delete DATA[activeSlot];
  save();
  closeSlot();
  renderGrid();
}

document.getElementById('m-save').addEventListener('click', saveSlot);
document.getElementById('m-cancel').addEventListener('click', closeSlot);
document.getElementById('m-del').addEventListener('click', clearSlot);
document.getElementById('m-log-btn').addEventListener('click', addLog);
document.getElementById('slot-ov').addEventListener('click', function(e) {
  if(e.target === this) closeSlot();
});

// ===== CHART =====
function openChart() {
  document.getElementById('chart-date').textContent = '📅 ' + document.getElementById('dlbl').textContent;
  var body = document.getElementById('chart-body');
  body.innerHTML = '';
  for(var i=0; i<FIXED.length; i++) {
    var f = FIXED[i];
    var g = getGoal(i);
    var a = getAchieved(i);
    var p = pct(a,g);
    var color = p>=100 ? 'linear-gradient(90deg,#f57f17,#fbc02d)' :
                p>=80  ? 'linear-gradient(90deg,#2e7d32,#43a047)' :
                p>=50  ? 'linear-gradient(90deg,#7b1fa2,#ce93d8)' :
                         'linear-gradient(90deg,#c62828,#ef5350)';
    var row = document.createElement('div');
    row.className = 'chart-row';
    row.innerHTML =
      '<div class="chart-lbl"><b>' + f.n + '</b><span>' + fmt(a) + ' / ' + fmt(g) + ' ' + f.u + '</span></div>' +
      '<div class="chart-track">' +
        (g>0 ?
          '<div class="chart-fill" style="width:'+Math.min(p,100)+'%;background:'+color+'"><em>'+p+'%</em></div>' :
          '<div class="chart-none"><em>لم يُدخل هدف</em></div>'
        ) +
      '</div>';
    body.appendChild(row);
    if(i < FIXED.length-1) {
      var div = document.createElement('div');
      div.className = 'chart-div';
      body.appendChild(div);
    }
  }
  document.getElementById('chart-ov').classList.add('open');
}

document.getElementById('chart-close').addEventListener('click', function() {
  document.getElementById('chart-ov').classList.remove('open');
});
document.getElementById('chart-ov').addEventListener('click', function(e) {
  if(e.target === this) this.classList.remove('open');
});

// ===== INIT =====
updateDate();
</script>
